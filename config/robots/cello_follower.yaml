# config/robots/cello_follower.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Robot overlay for: CELLO – starai-arm (star-arm variant)
#
# Source repo:  https://github.com/Welt-liu/star-arm-moveit2
# Local ws:     ~/Developer/ros2/starai_ws/src/starai-arm-moveit2/
# Robot name in SRDF: cello_description
#
# Values derived from:
#   cello_description/urdf/cello_description.urdf
#   cello_moveit_config/config/cello_description.srdf
#   cello_moveit_config/config/kinematics.yaml
#   cello_moveit_config/config/ros2_controllers.yaml
#
# Load AFTER config/robot.yaml.  Only fills in / overrides known values.
# Fields still null require physical measurement or bring-up verification.
# ─────────────────────────────────────────────────────────────────────────────

robot:

  # ── Identity ──────────────────────────────────────────────────────────────
  model: "cello_description"   # SRDF robot name
  variant: "cello"
  dof: 6                       # joint1 … joint6 (revolute)
  ros_distro: "humble"

  # ── MoveIt2 planning ──────────────────────────────────────────────────────
  planning_group: "arm"        # from cello_description.srdf <group name="arm">
  gripper_group: "hand"        # from cello_description.srdf <group name="hand">

  # ── TF frames ─────────────────────────────────────────────────────────────
  # Link chain (URDF):
  #   world → base_link                         (fixed, world_to_base)
  #   base_link → link1 → link2 → link3         (joints 1-3, revolute)
  #   link3 → link4 → link5 → link6             (joints 4-6, revolute)
  #   link6 → link7_left   (joint7_left,  prismatic – left  finger, actuated)
  #   link6 → link7_right  (joint7_right, prismatic – right finger, passive)
  #
  # SRDF: <end_effector name="hand" parent_link="link5" group="hand"/>
  # → arm planning tip = link6 (last link created by joint6: link5→link6)
  # → hand EE attaches at link5 per SRDF convention
  base_frame: "base_link"
  end_effector_link: "link6"   # palm / gripper base; last link of arm chain
  tool_frame: null             # TODO: define a TCP frame (child of link6) at
                               #       finger-tip midpoint once geometry is measured

  # Arm joints in URDF / controller order (excludes virtual_joint)
  joint_names:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6

  # ── ROS2 topics and actions ───────────────────────────────────────────────
  joint_state_topic: /joint_states   # published by joint_state_broadcaster (250 Hz)

  # arm_controller = JointTrajectoryController (ros2_controllers.yaml)
  trajectory_action: /arm_controller/follow_joint_trajectory

  # ── Gripper ───────────────────────────────────────────────────────────────
  gripper:
    interface_type: "gripper_action"

    # hand_controller = position_controllers/GripperActionController
    action: /hand_controller/gripper_cmd

    # Actuated finger joint (prismatic, metres from link6 origin)
    joint_name: joint7_left

    # URDF joint7_left limits: lower=-0.025, upper=0.0
    # Physical behaviour (confirmed on hardware):
    #   0.0    → fingers fully OPEN  (URDF upper limit)
    #  -0.025  → fingers CLOSED      (URDF lower limit; mechanical stop ~-0.032)
    # Note: SRDF group states have open/close labels swapped vs. physical behaviour.
    # GripperActionController sends these as the `position` field.
    open_position: 0.0       # metres (prismatic) – URDF upper limit
    close_position: -0.025   # metres (prismatic) – URDF lower limit (safe)

    # Physical gap at full open (2 × |open_position| × geometry factor).
    # TODO: measure actual fingertip separation on the physical robot.
    open_width: null         # TODO: metres, fingertip-to-fingertip at open_position
    close_width: 0.0         # hard stop

    max_force: 15.0          # Newtons; TODO: verify against motor spec

  # ── MoveIt2 package and files ─────────────────────────────────────────────
  moveit_package: "cello_moveit_config"
  urdf_package: "cello_description"
  urdf_file: "urdf/cello_description.urdf"
  srdf_package: "cello_moveit_config"
  srdf_file: "config/cello_description.srdf"

  # ── Kinematics ────────────────────────────────────────────────────────────
  # Source: cello_moveit_config/config/kinematics.yaml
  kinematics:
    plugin: "kdl_kinematics_plugin/KDLKinematicsPlugin"
    search_resolution: 0.005   # radians
    timeout: 0.005             # seconds

  # ── Camera / depth sensor ─────────────────────────────────────────────────
  # TODO: fill in once the sensor is mounted, cabled, and driver is running.
  camera:
    rgb_topic: null
    depth_topic: null
    info_topic: null
    point_cloud_topic: null
    frame_id: null

  # ── Hand-eye calibration ──────────────────────────────────────────────────
  calibration:
    method: null         # TODO: eye_in_hand or eye_to_hand
    transform_file: null # TODO: path to calibration result YAML

  # ── Known quirks ──────────────────────────────────────────────────────────
  # TODO: document anything found during bring-up
  quirks: []

# ── Smoke test ──────────────────────────────────────────────────────────────
smoke_test:
  # Captured from real hardware via `ros2 topic echo --once /joint_states`
  # and reordered to joint1 … joint6. Arm stretched forward, wrist slightly
  # down – a safe stow that also happens to reach the pen workspace.
  # Radians, one per joint in joint_names order (joint1 … joint6).
  home_joints: [-0.0003, -1.5668, 1.5295, 0.0008, 0.3780, -0.0010]

# ── Fixed-pose pick test (pre-perception bring-up) ─────────────────────────
fixed_pick_test:
  # Simple lift test: reads current EE pose via TF, plans to same pose +Z,
  # executes the MoveIt2-planned trajectory. Validates the full plan+execute
  # loop with real IK + collision checking, no perception, no object.
  test_lift_offset_z: 0.05   # metres – straight-up lift from current pose

  # EE pose captured via `tf2_echo base_link link6` with the gripper at the
  # pen's physical position. Top-down orientation (EE Z axis ≈ base -Z).
  object_pose:
    frame_id: base_link
    position:    {x: -0.289, y: 0.021, z: -0.005}
    orientation: {x:  0.998, y: 0.000, z: -0.061, w: 0.000}

  # EE pose captured over the pen holder. Top-down orientation.
  place_pose:
    frame_id: base_link
    position:    {x:  0.354, y: 0.180, z:  0.051}
    orientation: {x: -0.707, y: 0.707, z: -0.025, w: 0.025}

  # Cartesian approach / retreat distances (metres, along EE -Z = straight up).
  # Used for pre-grasp hover, lift-off after grasp, and descent before release.
  # NOTE: capped at 5 cm because lifting 10 cm from home_joints exceeds the
  # cello's reachable workspace (the arm at home is folded back over the base
  # near a wrist limit).  Both joint-space and cartesian planners refuse at
  # 10 cm (smoke test confirms 5 cm works).  Increase only with a different
  # home pose that has more headroom.
  pre_grasp_offset_z: 0.05   # hover 5 cm above object_pose before descending
  retreat_offset_z:   0.05   # lift 5 cm after grasp before moving to place
