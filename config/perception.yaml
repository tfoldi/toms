# config/perception.yaml
# Perception pipeline configuration.
#
# TODO fields require actual calibration or deployment decisions.

perception:
  # Backend selection: "mock" | "yolo" | "foundation_pose" | "custom"
  backend: "mock"   # TODO: switch to real backend for hardware

  # Object labels the system must detect
  target_labels:
    - "pen"
    - "pen_holder"

  # Detection confidence threshold; detections below this are ignored
  min_confidence: 0.6   # TODO: tune on real data

  # Pose estimation
  pose_estimation:
    # TODO: method ("foundation_pose" | "grounded_sam_6dof" | "aruco" | …)
    method: "TODO_pose_estimation_method"
    # TODO: model weights path (local, no cloud)
    model_weights: "TODO_path_to_weights"

  # Camera-to-robot transform (filled by calibration)
  # TODO: populate after running hand-eye calibration (see robot.yaml)
  camera_to_robot_transform: "TODO_load_from_calibration_file"

  # Workspace bounding box (to filter detections outside reachable area)
  # TODO: measure workspace limits from robot setup
  workspace_bounds:
    x_min: 0.10
    x_max: 0.70
    y_min: -0.40
    y_max: 0.40
    z_min: -0.05
    z_max: 0.30
